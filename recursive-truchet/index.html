<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#efeade" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Recursive" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Multi-scale Truchet — Winged Tiles</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icon-512.png" type="image/png" />
  <link rel="apple-touch-icon" href="./assets/icon-512.png" />
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
<canvas id="canvas" aria-label="Multi-scale Truchet canvas"></canvas>
<div class="toolbar" role="toolbar" aria-label="Tools">
  <button data-mode="rotate" class="active" aria-label="Rotate">
    <svg class="icon icon-rotate" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M21 3v6h-6"></path>
      <path d="M20.5 13a8.5 8.5 0 1 1-2.5-6L21 9"></path>
    </svg>
  </button>
  <button data-mode="fracture" aria-label="Fracture">
    <span class="icon icon-fracture" aria-hidden="true"></span>
  </button>
  <button data-mode="join" aria-label="Join">
    <span class="icon icon-join" aria-hidden="true"></span>
  </button>
</div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f3f0e8" />
  <title>fidget</title>
  <style>
    :root {
      --paper: #f3f0e8;
      --ink: #111;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
    }

    main {
      width: min(520px, 100%);
    }

    nav {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(14px, 4vw, 28px);
    }

    a {
      display: block;
      aspect-ratio: 1;
      border-radius: 22%;
      overflow: hidden;
      box-shadow: 0 12px 34px rgba(17, 17, 17, 0.16);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(17, 17, 17, 0.2);
    }

    a:focus-visible {
      outline: 3px solid var(--ink);
      outline-offset: 5px;
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <main>
    <nav aria-label="Games">
      <a href="./truchet/" aria-label="Truchet">
        <img src="./truchet/assets/icon-512.png" alt="" />
      </a>
      <a href="./recursive-truchet/" aria-label="Recursive Truchet">
        <img src="./recursive-truchet/assets/icon-512.png" alt="" />
      </a>
      <a href="./mondrian/" aria-label="Mondrian">
        <img src="./mondrian/assets/icon-512.png" alt="" />
      </a>
    </nav>
  </main>
  <script src="./launcher.js"></script>
  <script async data-id="101507205" src="//static.getclicky.com/js"></script>
</body>
</html>

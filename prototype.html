<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#f3f0e8" />
  <title>Truchet Fidget</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f0e8;
      --glass: rgba(243, 240, 232, 0.72);
      --line: rgba(5, 5, 5, 0.14);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
      touch-action: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background: var(--bg);
      cursor: grab;
      touch-action: none;
    }

    canvas.dragging { cursor: grabbing; }

    .hud {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 240ms ease, transform 240ms ease;
      font-size: 12px;
      letter-spacing: 0.02em;
      color: rgba(0, 0, 0, 0.62);
    }

    .hud.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .pill {
      pointer-events: auto;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }

    button {
      appearance: none;
      border: 0;
      border-left: 1px solid var(--line);
      margin: 0 0 0 2px;
      padding: 4px 2px 4px 10px;
      background: transparent;
      color: rgba(0, 0, 0, 0.72);
      font: inherit;
      cursor: pointer;
    }

    button:active { transform: translateY(1px); }

    .hidden { display: none; }
  </style>
</head>
<body>
  <canvas id="canvas" aria-label="Infinite Truchet tile canvas"></canvas>

  <div id="hud" class="hud visible">
    <div class="pill">
      <span id="hint">drag to pan · tap to advance tile · make color loops</span>
      <button id="clear" class="hidden" type="button" title="Clear saved changes">clear</button>
    </div>
  </div>

  <script>
  (() => {
    'use strict';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
    const hud = document.getElementById('hud');
    const hint = document.getElementById('hint');
    const clearButton = document.getElementById('clear');

    const TILE_SIZE = 92;              // CSS pixels. Tune this for denser/sparser tiles.
    const STROKE = TILE_SIZE * 0.125;
    const RADIUS = TILE_SIZE / 2;
    const TRANSITION_DURATION = 180;
    const QUARTER_TURN = Math.PI / 2;
    const SEED = 0x6d2b79f5;           // Change this to generate a different infinite plane.
    const STORAGE_KEY = `truchet-fidget:v4:seed-${SEED}:tile-${TILE_SIZE}`;
    const BG = '#f3f0e8';

    const COLOR = {
      R: '#d33a2c',
      Y: '#e7bd2c',
      B: '#2457a6'
    };

    // Six concrete tile types: three directed color combos, each in the two Truchet orientations.
    // `a` is the canonical upper-left arc; `b` is the canonical lower-right arc before orientation is applied.
    const TILE_TYPES = [
      { name: 'BY-0', a: COLOR.B, b: COLOR.Y, orientation: 0 },
      { name: 'BY-1', a: COLOR.B, b: COLOR.Y, orientation: 1 },
      { name: 'YR-0', a: COLOR.Y, b: COLOR.R, orientation: 0 },
      { name: 'YR-1', a: COLOR.Y, b: COLOR.R, orientation: 1 },
      { name: 'RB-0', a: COLOR.R, b: COLOR.B, orientation: 0 },
      { name: 'RB-1', a: COLOR.R, b: COLOR.B, orientation: 1 }
    ].map((tile) => ({ ...tile, ar: hexToRgb(tile.a), br: hexToRgb(tile.b) }));

    let width = 0;
    let height = 0;
    let dpr = 1;
    let raf = 0;
    let inertiaRaf = 0;
    let hudTimer = 0;

    // Camera is the world coordinate at the viewport center.
    const camera = { x: 0, y: 0 };
    const velocity = { x: 0, y: 0 };

    // Map of "x,y" -> delta steps from the deterministic default tile. Delta 0 is not stored.
    const edits = loadEdits();

    // Active visual transitions. Logical tile state updates immediately; this map stores only transient visuals.
    const animations = new Map();

    const spriteCache = new Map();

    // Direction is intentionally ephemeral: pick one when the user switches tiles,
    // then keep using it while they keep tapping that same tile.
    let activeTapKey = null;
    let activeTapDirection = 1;
    let saveTimer = 0;

    function hexToRgb(hex) {
      const n = parseInt(hex.slice(1), 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    function mixColor(from, to, t) {
      const r = Math.round(from.r + (to.r - from.r) * t);
      const g = Math.round(from.g + (to.g - from.g) * t);
      const b = Math.round(from.b + (to.b - from.b) * t);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function loadEdits() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        const entries = Array.isArray(parsed) ? parsed : [];
        const map = new Map();

        for (const entry of entries) {
          if (!Array.isArray(entry) || entry.length !== 2) continue;
          const [key, delta] = entry;
          const cleanDelta = Number(delta) % TILE_TYPES.length;
          if (typeof key === 'string' && cleanDelta > 0) map.set(key, cleanDelta);
        }

        return map;
      } catch (_) {
        return new Map();
      }
    }

    function queueSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify([...edits]));
        } catch (_) {
          // Storage can fail in private browsing or after quota exhaustion. The app still works in-memory.
        }
      }, 120);
    }

    function keyOf(ix, iy) {
      return ix + ',' + iy;
    }

    function hash2(ix, iy) {
      // Fast deterministic 32-bit coordinate hash. No Math.random; stable for negative coords too.
      let h = SEED ^ 0x9e3779b9;
      h = Math.imul(h ^ ix, 0x85ebca6b);
      h = Math.imul(h ^ iy, 0xc2b2ae35);
      h ^= h >>> 16;
      h = Math.imul(h, 0x7feb352d);
      h ^= h >>> 15;
      h = Math.imul(h, 0x846ca68b);
      h ^= h >>> 16;
      return h >>> 0;
    }

    function defaultTileIndex(ix, iy) {
      return hash2(ix | 0, iy | 0) % TILE_TYPES.length;
    }

    function tileIndex(ix, iy) {
      const key = keyOf(ix, iy);
      const delta = edits.get(key) || 0;
      return (defaultTileIndex(ix, iy) + delta) % TILE_TYPES.length;
    }

    function angleForTile(index) {
      return TILE_TYPES[index].orientation * QUARTER_TURN;
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function mixRgb(from, to, t) {
      return {
        r: Math.round(from.r + (to.r - from.r) * t),
        g: Math.round(from.g + (to.g - from.g) * t),
        b: Math.round(from.b + (to.b - from.b) * t)
      };
    }

    function rgbCss(rgb) {
      return `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
    }

    function representationFor(index, angle) {
      // The Truchet geometry has 180° symmetry, but colored arcs swap positions after a half turn.
      // This lets us keep rotating clockwise while still landing on the exact target tile visual.
      const tile = TILE_TYPES[index];
      const halfTurns = Math.round((angle - angleForTile(index)) / Math.PI);
      const swap = Math.abs(halfTurns % 2) === 1;
      return {
        angle,
        a: swap ? tile.br : tile.ar,
        b: swap ? tile.ar : tile.br
      };
    }

    function nextDirectionalRepresentation(index, afterAngle, direction) {
      const base = angleForTile(index);
      const epsilon = 0.0001;
      let halfTurns;
      let angle;

      if (direction > 0) {
        halfTurns = Math.ceil((afterAngle - base + epsilon) / Math.PI);
        angle = base + halfTurns * Math.PI;
        if (angle <= afterAngle + epsilon) angle += Math.PI;
      } else {
        halfTurns = Math.floor((afterAngle - base - epsilon) / Math.PI);
        angle = base + halfTurns * Math.PI;
        if (angle >= afterAngle - epsilon) angle -= Math.PI;
      }

      return representationFor(index, angle);
    }

    function directionForTap(key) {
      if (key !== activeTapKey) {
        activeTapKey = key;
        activeTapDirection = Math.random() < 0.5 ? -1 : 1;
      }
      return activeTapDirection;
    }

    function visualStateFor(key, index, now = performance.now()) {
      const anim = animations.get(key);
      if (!anim) return representationFor(index, angleForTile(index));

      const t = Math.min(1, Math.max(0, (now - anim.start) / anim.duration));
      const eased = easeOutCubic(t);
      return {
        angle: anim.fromAngle + (anim.toAngle - anim.fromAngle) * eased,
        a: mixRgb(anim.fromA, anim.toA, eased),
        b: mixRgb(anim.fromB, anim.toB, eased)
      };
    }

    function pruneAnimations(now) {
      for (const [key, anim] of animations) {
        if (now - anim.start >= anim.duration) animations.delete(key);
      }
    }

    function drawCanonicalTile(targetCtx, colorA, colorB) {
      targetCtx.lineWidth = STROKE;
      targetCtx.lineCap = 'butt';
      targetCtx.lineJoin = 'round';

      // Upper-left arc: connects the top midpoint to the left midpoint.
      targetCtx.strokeStyle = colorA;
      targetCtx.beginPath();
      targetCtx.arc(0, 0, RADIUS, 0, QUARTER_TURN, false);
      targetCtx.stroke();

      // Lower-right arc: connects the right midpoint to the bottom midpoint.
      targetCtx.strokeStyle = colorB;
      targetCtx.beginPath();
      targetCtx.arc(TILE_SIZE, TILE_SIZE, RADIUS, Math.PI, Math.PI + QUARTER_TURN, false);
      targetCtx.stroke();
    }

    function drawTileDef(targetCtx, tile, angle) {
      targetCtx.save();
      targetCtx.beginPath();
      targetCtx.rect(0, 0, TILE_SIZE, TILE_SIZE);
      targetCtx.clip();
      targetCtx.translate(TILE_SIZE / 2, TILE_SIZE / 2);
      targetCtx.rotate(angle);
      targetCtx.translate(-TILE_SIZE / 2, -TILE_SIZE / 2);
      drawCanonicalTile(targetCtx, tile.a, tile.b);
      targetCtx.restore();
    }

    function spriteFor(tileIndex) {
      const cacheKey = `${tileIndex}:${dpr}`;
      let sprite = spriteCache.get(cacheKey);
      if (sprite) return sprite;

      sprite = document.createElement('canvas');
      sprite.width = Math.ceil(TILE_SIZE * dpr);
      sprite.height = Math.ceil(TILE_SIZE * dpr);

      const sctx = sprite.getContext('2d');
      sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      sctx.clearRect(0, 0, TILE_SIZE, TILE_SIZE);
      sctx.imageSmoothingEnabled = true;
      sctx.imageSmoothingQuality = 'high';
      drawTileDef(sctx, TILE_TYPES[tileIndex], angleForTile(tileIndex));

      spriteCache.set(cacheKey, sprite);
      return sprite;
    }

    function drawAnimatedTile(x, y, anim, now) {
      const t = Math.min(1, Math.max(0, (now - anim.start) / anim.duration));
      const eased = easeOutCubic(t);
      const angle = anim.fromAngle + (anim.toAngle - anim.fromAngle) * eased;
      const colorA = rgbCss(mixRgb(anim.fromA, anim.toA, eased));
      const colorB = rgbCss(mixRgb(anim.fromB, anim.toB, eased));

      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, TILE_SIZE, TILE_SIZE);
      ctx.clip();
      ctx.translate(x + TILE_SIZE / 2, y + TILE_SIZE / 2);
      ctx.rotate(angle);
      ctx.translate(-TILE_SIZE / 2, -TILE_SIZE / 2);
      drawCanonicalTile(ctx, colorA, colorB);
      ctx.restore();
    }

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2.5);

      canvas.width = Math.ceil(width * dpr);
      canvas.height = Math.ceil(height * dpr);
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';

      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      spriteCache.clear();
      requestDraw();
    }

    function requestDraw() {
      if (!raf) raf = requestAnimationFrame(draw);
    }

    function draw() {
      raf = 0;
      const now = performance.now();
      pruneAnimations(now);

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, width, height);

      // One viewport of buffer in all directions. Rendering remains bounded and pan stays smooth.
      const bufferX = width;
      const bufferY = height;
      const worldLeft = camera.x - width / 2 - bufferX;
      const worldRight = camera.x + width / 2 + bufferX;
      const worldTop = camera.y - height / 2 - bufferY;
      const worldBottom = camera.y + height / 2 + bufferY;

      const ix0 = Math.floor(worldLeft / TILE_SIZE);
      const ix1 = Math.floor(worldRight / TILE_SIZE);
      const iy0 = Math.floor(worldTop / TILE_SIZE);
      const iy1 = Math.floor(worldBottom / TILE_SIZE);

      for (let iy = iy0; iy <= iy1; iy++) {
        const y = iy * TILE_SIZE - camera.y + height / 2;
        for (let ix = ix0; ix <= ix1; ix++) {
          const x = ix * TILE_SIZE - camera.x + width / 2;
          const key = keyOf(ix, iy);
          const anim = animations.get(key);

          if (anim) {
            drawAnimatedTile(x, y, anim, now);
          } else {
            ctx.drawImage(spriteFor(tileIndex(ix, iy)), x, y, TILE_SIZE, TILE_SIZE);
          }
        }
      }

      if (animations.size) requestDraw();
    }

    function worldFromScreen(clientX, clientY) {
      return {
        x: clientX - width / 2 + camera.x,
        y: clientY - height / 2 + camera.y
      };
    }

    function tileFromScreen(clientX, clientY) {
      const world = worldFromScreen(clientX, clientY);
      return {
        ix: Math.floor(world.x / TILE_SIZE),
        iy: Math.floor(world.y / TILE_SIZE)
      };
    }

    function advanceTile(ix, iy) {
      const key = keyOf(ix, iy);
      const direction = directionForTap(key);
      const now = performance.now();
      const fromIndex = tileIndex(ix, iy);
      const from = visualStateFor(key, fromIndex, now);
      const defaultIndex = defaultTileIndex(ix, iy);
      const nextIndex = (fromIndex + direction + TILE_TYPES.length) % TILE_TYPES.length;
      const nextDelta = (nextIndex - defaultIndex + TILE_TYPES.length) % TILE_TYPES.length;
      const to = nextDirectionalRepresentation(nextIndex, from.angle, direction);

      if (nextDelta === 0) edits.delete(key);
      else edits.set(key, nextDelta);

      animations.set(key, {
        fromAngle: from.angle,
        toAngle: to.angle,
        fromA: from.a,
        fromB: from.b,
        toA: to.a,
        toB: to.b,
        start: now,
        duration: TRANSITION_DURATION
      });

      updateHud();
      queueSave();
      requestDraw();
    }

    function updateHud() {
      const n = edits.size;
      clearButton.classList.toggle('hidden', n === 0);
      hint.textContent = n === 0
        ? 'drag to pan · tap to advance tile · make color loops'
        : `${n} changed · make color loops`;
      showHud();
    }

    function showHud() {
      hud.classList.add('visible');
      clearTimeout(hudTimer);
      hudTimer = setTimeout(() => hud.classList.remove('visible'), 2600);
    }

    function clearEdits() {
      edits.clear();
      animations.clear();
      activeTapKey = null;
      activeTapDirection = 1;
      queueSave();
      updateHud();
      requestDraw();
    }

    const pointer = {
      id: null,
      down: false,
      moved: false,
      startX: 0,
      startY: 0,
      lastX: 0,
      lastY: 0,
      lastT: 0,
      totalDx: 0,
      totalDy: 0
    };

    function stopInertia() {
      if (inertiaRaf) cancelAnimationFrame(inertiaRaf);
      inertiaRaf = 0;
      velocity.x = 0;
      velocity.y = 0;
    }

    canvas.addEventListener('pointerdown', (event) => {
      if (pointer.down) return;
      stopInertia();
      canvas.setPointerCapture(event.pointerId);
      canvas.classList.add('dragging');

      pointer.id = event.pointerId;
      pointer.down = true;
      pointer.moved = false;
      pointer.startX = pointer.lastX = event.clientX;
      pointer.startY = pointer.lastY = event.clientY;
      pointer.lastT = performance.now();
      pointer.totalDx = 0;
      pointer.totalDy = 0;
      velocity.x = 0;
      velocity.y = 0;
      showHud();
    });

    canvas.addEventListener('pointermove', (event) => {
      if (!pointer.down || event.pointerId !== pointer.id) return;

      const now = performance.now();
      const dx = event.clientX - pointer.lastX;
      const dy = event.clientY - pointer.lastY;
      const dt = Math.max(1, now - pointer.lastT);

      pointer.totalDx += dx;
      pointer.totalDy += dy;

      if (Math.hypot(event.clientX - pointer.startX, event.clientY - pointer.startY) > 7) {
        pointer.moved = true;
      }

      camera.x -= dx;
      camera.y -= dy;
      velocity.x = -dx / dt;
      velocity.y = -dy / dt;

      pointer.lastX = event.clientX;
      pointer.lastY = event.clientY;
      pointer.lastT = now;

      requestDraw();
    });

    function endPointer(event) {
      if (!pointer.down || event.pointerId !== pointer.id) return;
      pointer.down = false;
      pointer.id = null;
      canvas.classList.remove('dragging');

      if (!pointer.moved) {
        const tile = tileFromScreen(event.clientX, event.clientY);
        advanceTile(tile.ix, tile.iy);
        return;
      }

      const speed = Math.hypot(velocity.x, velocity.y);
      if (speed > 0.06) startInertia();
    }

    canvas.addEventListener('pointerup', endPointer);
    canvas.addEventListener('pointercancel', endPointer);

    function startInertia() {
      let last = performance.now();
      const decayPerFrame = 0.92;

      const step = () => {
        const now = performance.now();
        const dt = Math.min(32, now - last);
        last = now;

        camera.x += velocity.x * dt;
        camera.y += velocity.y * dt;

        const decay = Math.pow(decayPerFrame, dt / 16.6667);
        velocity.x *= decay;
        velocity.y *= decay;

        requestDraw();

        if (Math.hypot(velocity.x, velocity.y) > 0.01) {
          inertiaRaf = requestAnimationFrame(step);
        } else {
          inertiaRaf = 0;
          velocity.x = 0;
          velocity.y = 0;
        }
      };

      inertiaRaf = requestAnimationFrame(step);
    }

    clearButton.addEventListener('pointerdown', (event) => event.stopPropagation());
    clearButton.addEventListener('click', (event) => {
      event.stopPropagation();
      clearEdits();
    });

    window.addEventListener('resize', resize, { passive: true });
    window.addEventListener('orientationchange', resize, { passive: true });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'c' || event.key === 'C') clearEdits();
      if (event.key === '0') {
        stopInertia();
        camera.x = 0;
        camera.y = 0;
        requestDraw();
      }
    });

    updateHud();
    setTimeout(() => hud.classList.remove('visible'), 3200);
    resize();
  })();
  </script>
</body>
</html>
